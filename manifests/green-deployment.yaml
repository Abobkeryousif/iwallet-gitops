apiVersion: apps/v1
kind: Deployment
metadata:
  name: iwallet-app-green
  namespace: iwallet-app

spec:
  replicas: 5
  selector:
    matchLabels:
      app: iwallet-app
  template:
    metadata:
      labels:
        app: iwallet-app
        version: green
    spec:
      imagePullSecrets: 
        - name: ghcr-secret
      containers:
        - name: iwallet-app-container
          image: ghcr.io/abobkeryousif/iwallet:01e64b9d80021acf2837d10a244f03aba3a6c5b0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          resources:
            limits:
              memory: "300Mi" 
              cpu: "500m"
            requests:
              memory: "200Mi"
              cpu: "350m"
    



